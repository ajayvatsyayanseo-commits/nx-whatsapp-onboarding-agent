[program:nxtutors-whatsapp-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/artisan queue:work %(ENV_QUEUE_CONNECTION)s --queue=%(ENV_WHATSAPP_ONBOARDING_QUEUE)s --sleep=1 --tries=3 --timeout=120
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=1
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
