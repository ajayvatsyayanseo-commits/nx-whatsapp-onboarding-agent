services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: /app
    volumes:
      - ../..:/app
    ports:
      - "8000:8000"
    env_file:
      - ../.env.local.example
    depends_on:
      - postgres
      - redis
    command: php artisan serve --host=0.0.0.0 --port=8000

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: /app
    volumes:
      - ../..:/app
    env_file:
      - ../.env.local.example
    depends_on:
      - postgres
      - redis
    command: php artisan queue:work --queue=whatsapp-onboarding --sleep=1 --tries=3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nxtutors
      POSTGRES_USER: nxtutors
      POSTGRES_PASSWORD: nxtutors_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
