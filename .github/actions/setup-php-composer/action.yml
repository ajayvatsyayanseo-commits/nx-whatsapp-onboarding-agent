name: Setup PHP and Composer
description: Configure PHP, Composer cache, and install package dependencies.
inputs:
  php-version:
    description: PHP version to install.
    required: false
    default: "8.2"
  working-directory:
    description: Directory containing composer.json.
    required: false
    default: nx-whatsapp-onboarding-agent
  install-args:
    description: Composer install arguments.
    required: false
    default: "--no-interaction --prefer-dist --no-progress"
runs:
  using: composite
  steps:
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        extensions: mbstring, intl, pdo, pdo_pgsql, redis, pcntl
        coverage: xdebug
        tools: composer:v2

    - name: Get Composer cache directory
      id: composer-cache
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

    - name: Cache Composer dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles(format('{0}/composer.lock', inputs.working-directory), format('{0}/composer.json', inputs.working-directory)) }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Install Composer dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: composer install ${{ inputs.install-args }}
