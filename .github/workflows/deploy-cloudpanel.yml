name: Deploy Onboarding Agent (CloudPanel)

# Auto-deploys the standalone WhatsApp onboarding agent (public/index.php) to the
# CloudPanel server over SSH password auth. The agent is plain PHP (no
# composer/build), so this is a straight rsync of the repo into the CloudPanel
# site directory.
#
# Required GitHub repository secrets:
# - CLOUDPANEL_HOST
# - CLOUDPANEL_SSH_USER
# - CLOUDPANEL_SSH_PASSWORD
#
# The server `.env` is NEVER touched (it is excluded), so your DB config and
# secrets on the server are preserved across deploys.

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'nx-whatsapp-onboarding-agent/**'
      - '.github/workflows/deploy-cloudpanel.yml'
  workflow_dispatch:

concurrency:
  group: deploy-cloudpanel
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to CloudPanel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SSH_HOST: ${{ secrets.CLOUDPANEL_HOST }}
      SSH_USER: ${{ secrets.CLOUDPANEL_SSH_USER }}
      SSHPASS: ${{ secrets.CLOUDPANEL_SSH_PASSWORD }}
      SSH_PORT: ${{ vars.CLOUDPANEL_SSH_PORT || '22' }}
      CLOUDPANEL_DOMAIN: onboarding.nxtutors.com
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH password tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends sshpass rsync

      - name: Prepare SSH known hosts
        run: |
          test -n "$SSH_HOST" || { echo "Missing secret CLOUDPANEL_HOST"; exit 1; }
          test -n "$SSH_USER" || { echo "Missing secret CLOUDPANEL_SSH_USER"; exit 1; }
          test -n "$SSHPASS" || { echo "Missing secret CLOUDPANEL_SSH_PASSWORD"; exit 1; }
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Resolve CloudPanel deploy path
        run: |
          RESOLVED_PATH="$(sshpass -e ssh -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" \
            "set -eu
             if [ -d \"\$HOME/htdocs/$CLOUDPANEL_DOMAIN\" ]; then
               printf '%s' \"\$HOME/htdocs/$CLOUDPANEL_DOMAIN\"
             elif [ -d \"\$HOME/htdocs\" ]; then
               mkdir -p \"\$HOME/htdocs/$CLOUDPANEL_DOMAIN\"
               printf '%s' \"\$HOME/htdocs/$CLOUDPANEL_DOMAIN\"
             else
               mkdir -p \"\$HOME/$CLOUDPANEL_DOMAIN\"
               printf '%s' \"\$HOME/$CLOUDPANEL_DOMAIN\"
             fi")"
          echo "DEPLOY_PATH=$RESOLVED_PATH" >> "$GITHUB_ENV"
          echo "Resolved deploy path: $RESOLVED_PATH"

      - name: Verify SSH connection and deploy path is writable
        run: |
          sshpass -e ssh -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" \
            "mkdir -p '$DEPLOY_PATH/public' && test -w '$DEPLOY_PATH' && echo 'deploy path OK'"

      - name: Deploy via rsync
        run: |
          sshpass -e rsync -azv --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='tests' \
            --exclude='docker' \
            --exclude='infra' \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=accept-new" \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Post-deploy DB self-test (no insert)
        run: |
          sshpass -e ssh -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" \
            "cd '$DEPLOY_PATH' && php nx-whatsapp-onboarding-agent/scripts/whatsapp_db_check.php || true"

      - name: Summary
        if: always()
        run: |
          echo "## CloudPanel deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Host: $SSH_HOST" >> "$GITHUB_STEP_SUMMARY"
          echo "- Path: $DEPLOY_PATH" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docroot must be set to: $DEPLOY_PATH/public" >> "$GITHUB_STEP_SUMMARY"
