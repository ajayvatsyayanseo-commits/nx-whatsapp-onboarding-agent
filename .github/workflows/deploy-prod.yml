name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Immutable image tag to deploy. Use a staging-tested git SHA.
        required: true
        type: string
      run_terraform:
        description: Run terraform apply after plan.
        required: false
        type: boolean
        default: false
      run_migrations:
        description: Run Laravel migrations with --force.
        required: false
        type: boolean
        default: true
      allow_destructive_migrations:
        description: Allow migrations classified as requires_approval.
        required: false
        type: boolean
        default: false
  release:
    types:
      - published

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy prod
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 60
    env:
      ENVIRONMENT: prod
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_PROD_DEPLOY_ROLE_ARN }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_WEB_SERVICE: ${{ vars.ECS_WEB_SERVICE }}
      ECS_WORKER_SERVICE: ${{ vars.ECS_WORKER_SERVICE }}
      ECS_WEB_TASK_FAMILY: ${{ vars.ECS_WEB_TASK_FAMILY }}
      ECS_WORKER_TASK_FAMILY: ${{ vars.ECS_WORKER_TASK_FAMILY }}
      APP_URL: ${{ vars.APP_URL }}
      WEBHOOK_VERIFY_URL: ${{ vars.WEBHOOK_VERIFY_URL }}
      SYNTHETIC_WEBHOOK_URL: ${{ vars.SYNTHETIC_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Resolve image tag
        id: image
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${GITHUB_SHA}"
          else
            TAG="${{ inputs.image_tag }}"
          fi
          IMAGE_URI="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${TAG}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Promote prod image tag
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:prod" \
            "${{ steps.image.outputs.uri }}"

      - name: Terraform plan
        working-directory: nx-whatsapp-onboarding-agent/infra/terraform/envs/prod
        run: |
          terraform init
          terraform plan -out=tfplan

      - name: Terraform apply
        if: inputs.run_terraform == true
        working-directory: nx-whatsapp-onboarding-agent/infra/terraform/envs/prod
        run: terraform apply -auto-approve tfplan

      - name: Classify migrations
        id: migrations
        run: |
          CLASSIFICATION=$(bash ./nx-whatsapp-onboarding-agent/scripts/deploy_migrate.sh classify)
          echo "classification=$CLASSIFICATION" >> "$GITHUB_OUTPUT"
          echo "Migration classification: $CLASSIFICATION" >> "$GITHUB_STEP_SUMMARY"
          if [ "$CLASSIFICATION" = "blocked" ]; then exit 1; fi
          if [ "$CLASSIFICATION" = "requires_approval" ] && [ "${{ inputs.allow_destructive_migrations }}" != "true" ]; then exit 1; fi

      - name: Create pre-deploy checkpoint
        if: inputs.run_migrations == true
        run: bash ./nx-whatsapp-onboarding-agent/scripts/deploy_migrate.sh checkpoint

      - name: Deploy ECS services
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
        run: |
          bash ./nx-whatsapp-onboarding-agent/scripts/deploy_migrate.sh register-task-definitions "$IMAGE_URI"
          bash ./nx-whatsapp-onboarding-agent/scripts/deploy_migrate.sh update-service web "$IMAGE_URI"
          bash ./nx-whatsapp-onboarding-agent/scripts/deploy_migrate.sh update-service worker "$IMAGE_URI"

      - name: Run migrations
        if: inputs.run_migrations == true
        run: bash ./nx-whatsapp-onboarding-agent/scripts/deploy_migrate.sh migrate

      - name: Wait for stability
        run: bash ./nx-whatsapp-onboarding-agent/scripts/ecs_wait_for_stability.sh

      - name: Smoke test
        run: bash ./nx-whatsapp-onboarding-agent/scripts/smoke_test.sh --strong

      - name: Synthetic internal webhook test
        if: env.SYNTHETIC_WEBHOOK_URL != ''
        run: |
          curl --fail --silent --show-error \
            -H 'Content-Type: application/json' \
            -X POST "$SYNTHETIC_WEBHOOK_URL" \
            -d '{"source":"github-actions","type":"synthetic","message":"signup"}'

      - name: Automatic rollback on failure
        if: failure()
        run: bash ./nx-whatsapp-onboarding-agent/scripts/rollback_ecs.sh "$ENVIRONMENT" web "" "automatic rollback after failed prod deploy"

      - name: Summary
        if: always()
        run: |
          echo "## Production deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: ${{ steps.image.outputs.uri }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Git SHA: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Migration status: ${{ steps.migrations.outputs.classification }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Rollback: run rollback.yml with environment=prod and service=web/worker." >> "$GITHUB_STEP_SUMMARY"
