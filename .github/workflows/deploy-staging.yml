name: Deploy Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_terraform:
        description: Run terraform apply for staging.
        required: false
        type: boolean
        default: false
      run_migrations:
        description: Run Laravel migrations.
        required: false
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy staging
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 50
    env:
      ENVIRONMENT: staging
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_STAGING_DEPLOY_ROLE_ARN }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_WEB_SERVICE: ${{ vars.ECS_WEB_SERVICE }}
      ECS_WORKER_SERVICE: ${{ vars.ECS_WORKER_SERVICE }}
      ECS_WEB_TASK_FAMILY: ${{ vars.ECS_WEB_TASK_FAMILY }}
      ECS_WORKER_TASK_FAMILY: ${{ vars.ECS_WORKER_TASK_FAMILY }}
      ECS_SUBNET_IDS: ${{ vars.ECS_SUBNET_IDS }}
      ECS_SECURITY_GROUP_IDS: ${{ vars.ECS_SECURITY_GROUP_IDS }}
      APP_URL: ${{ vars.APP_URL }}
      WEBHOOK_VERIFY_URL: ${{ vars.WEBHOOK_VERIFY_URL }}
      TF_INPUT: false
      APP_KEY: ${{ secrets.APP_KEY }}
      APP_ENV: ${{ vars.APP_ENV || 'production' }}
      APP_DEBUG: "false"
      LOG_CHANNEL: ${{ vars.LOG_CHANNEL || 'stack' }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
      DB_CONNECTION: ${{ vars.DB_CONNECTION || 'mysql' }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_DATABASE: ${{ secrets.DB_DATABASE }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      REDIS_HOST: ${{ secrets.REDIS_HOST }}
      REDIS_PORT: ${{ secrets.REDIS_PORT }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      REDIS_CONNECTION: ${{ vars.REDIS_CONNECTION || 'default' }}
      CACHE_STORE: ${{ vars.CACHE_STORE || 'redis' }}
      SESSION_DRIVER: ${{ vars.SESSION_DRIVER || 'redis' }}
      QUEUE_CONNECTION: ${{ vars.QUEUE_CONNECTION || 'redis' }}
      META_WHATSAPP_VERIFY_TOKEN: ${{ secrets.META_WHATSAPP_VERIFY_TOKEN }}
      META_WHATSAPP_APP_SECRET: ${{ secrets.META_WHATSAPP_APP_SECRET }}
      META_WHATSAPP_ACCESS_TOKEN: ${{ secrets.META_WHATSAPP_ACCESS_TOKEN }}
      META_WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.META_WHATSAPP_PHONE_NUMBER_ID }}
      TERMS_STUDENT_URL: ${{ vars.TERMS_STUDENT_URL }}
      PRIVACY_STUDENT_URL: ${{ vars.PRIVACY_STUDENT_URL }}
      TERMS_TUTOR_URL: ${{ vars.TERMS_TUTOR_URL }}
      PRIVACY_TUTOR_URL: ${{ vars.PRIVACY_TUTOR_URL }}
      STUDENT_DASHBOARD_URL: ${{ vars.STUDENT_DASHBOARD_URL }}
      TUTOR_DASHBOARD_URL: ${{ vars.TUTOR_DASHBOARD_URL }}
      WHATSAPP_ONBOARDING_LOGIN_URL: ${{ vars.WHATSAPP_ONBOARDING_LOGIN_URL }}
      WHATSAPP_ONBOARDING_ENABLED: ${{ vars.WHATSAPP_ONBOARDING_ENABLED || 'true' }}
      WHATSAPP_SIGNUP_ENABLED: ${{ vars.WHATSAPP_SIGNUP_ENABLED || 'true' }}
      WHATSAPP_STUDENT_SIGNUP_ENABLED: ${{ vars.WHATSAPP_STUDENT_SIGNUP_ENABLED || 'true' }}
      WHATSAPP_TUTOR_SIGNUP_ENABLED: ${{ vars.WHATSAPP_TUTOR_SIGNUP_ENABLED || 'true' }}
      WHATSAPP_CREATE_REAL_PROFILE: ${{ vars.WHATSAPP_CREATE_REAL_PROFILE || 'false' }}
      WHATSAPP_ONBOARDING_PAUSED: ${{ vars.WHATSAPP_ONBOARDING_PAUSED || 'false' }}
      WHATSAPP_OUTBOUND_PAUSED: ${{ vars.WHATSAPP_OUTBOUND_PAUSED || 'false' }}
      MEDIA_STORAGE_DRIVER: ${{ vars.MEDIA_STORAGE_DRIVER || 'legacy_public_user' }}
      AWS_S3_MEDIA_BUCKET: ${{ secrets.AWS_S3_MEDIA_BUCKET }}
      WHATSAPP_ONBOARDING_S3_MEDIA_BUCKET: ${{ secrets.WHATSAPP_ONBOARDING_S3_MEDIA_BUCKET }}
      WHATSAPP_ONBOARDING_ANALYTICS_BUCKET: ${{ secrets.WHATSAPP_ONBOARDING_ANALYTICS_BUCKET }}
      DASHBOARD_SIGNING_KEY: ${{ secrets.DASHBOARD_SIGNING_KEY }}
      SYNTHETIC_WEBHOOK_SECRET: ${{ secrets.SYNTHETIC_WEBHOOK_SECRET }}
      ONBOARDING_AGENT_INTERNAL_SECRET: ${{ secrets.ONBOARDING_AGENT_INTERNAL_SECRET }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_PROVIDER_API_KEY: ${{ secrets.LLM_PROVIDER_API_KEY }}
      WHATSAPP_ONBOARDING_LLM_ENABLED: ${{ vars.WHATSAPP_ONBOARDING_LLM_ENABLED || 'false' }}
      META_WHATSAPP_API_VERSION: ${{ vars.META_WHATSAPP_API_VERSION || 'v20.0' }}
      META_GRAPH_BASE_URL: ${{ vars.META_GRAPH_BASE_URL || 'https://graph.facebook.com' }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: hashicorp/setup-terraform@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: nx-whatsapp-onboarding-agent/docker/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:main
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:staging

      - name: Terraform apply staging
        if: github.event_name == 'workflow_dispatch' && inputs.run_terraform == true
        working-directory: nx-whatsapp-onboarding-agent/infra/terraform/envs/staging
        run: |
          terraform init -input=false
          terraform plan -input=false -out=tfplan
          terraform apply -input=false -auto-approve tfplan

      - name: Ensure ECS HTTP ingress
        run: |
          for sg in $(echo "$ECS_SECURITY_GROUP_IDS" | tr ',' ' '); do
            aws ec2 authorize-security-group-ingress \
              --group-id "$sg" \
              --ip-permissions IpProtocol=tcp,FromPort=80,ToPort=80,IpRanges='[{CidrIp=0.0.0.0/0,Description="temporary ECS HTTP health check access"}]' \
              >/dev/null 2>&1 || true
          done

      - name: Deploy ECS services
        env:
          IMAGE_URI: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          bash ./nx-whatsapp-onboarding-agent/scripts/deploy_migrate.sh register-task-definitions "$IMAGE_URI"
          bash ./nx-whatsapp-onboarding-agent/scripts/deploy_migrate.sh update-service web "$IMAGE_URI"
          bash ./nx-whatsapp-onboarding-agent/scripts/deploy_migrate.sh update-service worker "$IMAGE_URI"

      - name: Run migrations
        if: github.event_name == 'workflow_dispatch' && inputs.run_migrations == true
        run: bash ./nx-whatsapp-onboarding-agent/scripts/deploy_migrate.sh migrate

      - name: Wait for stability
        run: bash ./nx-whatsapp-onboarding-agent/scripts/ecs_wait_for_stability.sh

      - name: Smoke test
        run: bash ./nx-whatsapp-onboarding-agent/scripts/smoke_test.sh

      - name: Summary
        if: always()
        run: |
          echo "## Staging deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: staging" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
